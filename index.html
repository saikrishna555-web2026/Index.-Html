<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRASAD M. M. - Digital Card</title>
    <style>
        body { 
            margin: 0; padding: 0; height: 100vh; display: flex; justify-content: center; align-items: center;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); 
            font-family: 'Segoe UI', Arial, sans-serif;
        }
        #password-screen {
            background: white; padding: 30px; border-radius: 20px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            width: 280px;
        }
        input { padding: 12px; border-radius: 8px; border: 1px solid #ccc; margin-bottom: 15px; width: 80%; font-size: 16px; text-align: center; }
        button { padding: 12px 25px; background: #b21f1f; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 95%; }
        #main-card { display: none; }
        .card { 
            background: white; padding: 40px 20px; border-radius: 25px; 
            text-align: center; width: 310px; border: 4px solid #ffd700;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        h2 { color: #b21f1f; font-size: 26px; margin-bottom: 5px; }
        .agm { color: #333; font-weight: bold; margin-bottom: 25px; border-bottom: 2px solid #ffd700; display: inline-block; padding-bottom: 5px; }
        .btn { 
            text-decoration: none; padding: 15px; border-radius: 50px; color: white; 
            font-weight: bold; font-size: 18px; display: block; margin: 10px 0;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .call { background: linear-gradient(to right, #11998e, #38ef7d); }
        .wa { background: linear-gradient(to right, #25D366, #128C7E); }
    </style>
</head>
<body>
    <div id="password-screen">
        <h3 style="color: #b21f1f;">🔒 Private Card</h3>
        <p>పాస్‌వర్డ్ ఎంటర్ చేయండి</p>
        <input type="password" id="passInput" placeholder="Password రాయండి">
        <button onclick="checkPassword()">OPEN CARD</button>
    </div>
    <div id="main-card">
        <div class="card">
            <h2>PRASAD M. M.</h2>
            <div class="agm">Assistant General Manager (AGM)</div>
            <p style="color: #666; font-weight: bold;">Navayuga Engineering Company</p>
            <a href="tel:+918527784789" class="btn call">📞 CALL ME</a>
            <a href="https://wa.me/918527784789" class="btn wa">💬 WHATSAPP</a>
        </div>
    </div>
    <script>
        function checkPassword() {
            var password = document.getElementById("passInput").value;
            if (password === "1968") {
                document.getElementById("password-screen").style.display = "none";
                document.getElementById("main-card").style.display = "block";
            } else {
                alert("తప్పు పాస్‌వర్డ్!");
            }
        }
    </script>
</body>
</html>
